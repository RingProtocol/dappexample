<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First DApp</title>
    <link rel="stylesheet" href="src/css/main.css">
</head>
<body>
    <div class="container">
        <h1>🚀 First DApp</h1>
        <p>A simple decentralized application</p>
        
        <!-- Wallet Connection Section -->
        <div class="card">
            <h2>Wallet</h2>
            <button id="connectBtn" class="btn btn-primary">Connect Wallet</button>
            <div id="walletInfo" class="wallet-info" style="display: none;">
                <div class="info-row">
                    <span class="label">Account:</span>
                    <span id="accountDisplay" class="value"></span>
                </div>
                <div class="info-row">
                    <span class="label">Balance:</span>
                    <span id="balanceDisplay" class="value"></span>
                </div>
            </div>
        </div>
        
        <!-- Send Transaction Section -->
        <div class="card" id="sendCard">
            <h2>Send ETH</h2>
            <input type="text" id="sendToAddress" placeholder="Recipient Address (0x...)" />
            <input type="number" id="sendAmount" placeholder="Amount (ETH)" step="0.0001" />
            <button id="sendBtn" class="btn btn-primary">Send Transaction</button>
        </div>
        
        <!-- Import ERC20 Token Section -->
        <div class="card">
            <h2>Import ERC20 Token</h2>
            <input type="text" id="tokenAddress" placeholder="Token Contract Address (0x...)" />
            <input type="text" id="tokenSymbol" placeholder="Token Symbol (e.g., USDT)" />
            <input type="text" id="tokenDecimals" placeholder="Decimals (e.g., 18)" />
            <button id="importTokenBtn" class="btn btn-secondary">Import Token</button>
        </div>
        
        <!-- Imported Tokens List -->
        <div class="card">
            <h2>Your Tokens</h2>
            <div id="tokenList" class="token-list">
                <p class="empty-state">No tokens imported yet</p>
            </div>
        </div>
        
        <!-- Transaction History Section -->
        <div class="card">
            <h2>Transaction History</h2>
            <div class="tx-tabs">
                <button class="tx-tab active" data-tab="app">App History</button>
                <button class="tx-tab" data-tab="etherscan">From Etherscan</button>
            </div>
            <div id="etherscanApiSection">
                <input type="text" id="etherscanApiKey" placeholder="Enter Etherscan API Key (optional)" />
                <button id="fetchEtherscanBtn" class="btn btn-secondary" style="margin-top: 8px;">Fetch History</button>
            </div>
            <div id="transactionList" class="transaction-list">
                <p class="empty-state">No transactions yet</p>
            </div>
        </div>
    </div>
    
    <!-- Web3.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    
    <!-- Application Scripts (ES Modules) -->
    <script type="module" src="src/js/main.js"></script>
</body>
</html>
